[functions]
  directory = "netlify/functions"

[build]
command = "npx vite build"
publish = "dist"

[build.environment]
  GEMINI_API_KEY = ""
  SUPABASE_URL = ""
  SUPABASE_ANON_KEY = ""

# SPA fallback — every route (including /auth/callback) loads index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
